<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Системная проверка</title>
    <style>
        body { 
            background: #f4f4f5; color: #111; font-family: -apple-system, sans-serif; 
            padding: 20px; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; min-height: 100vh; margin: 0; box-sizing: border-box;
        }
        .box { 
            background: #fff; border-radius: 12px; padding: 25px; width: 100%; 
            max-width: 350px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            position: relative; z-index: 10;
        }
        h2 { color: #d32f2f; text-align: center; margin-top: 0; margin-bottom: 20px; font-size: 22px; }
        .step { 
            margin-bottom: 15px; padding: 15px; background: #fafafa; 
            border-radius: 8px; border-left: 4px solid #d32f2f; 
        }
        .step-2 { border-left-color: #1976d2; }
        .step-title { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        .step-desc { color: #555; font-size: 14px; margin: 0; line-height: 1.4; }
        
        /* Кнопка */
        .btn { 
            display: block; width: 100%; background: #1976d2; color: #fff; 
            text-align: center; padding: 16px 10px; border-radius: 8px; 
            text-decoration: none; font-weight: bold; margin-top: 10px; 
            box-sizing: border-box; font-size: 16px; text-transform: uppercase;
            border: none; cursor: pointer;
        }

        /* Указатель на компас (Сдвинут вправо на 25px и ВНИЗ на 20px) */
        .arrow-wrapper { 
            position: fixed; bottom: 20px; right: 25px; text-align: center; 
            z-index: 100; animation: bounceDown 1s infinite; display: none; 
            flex-direction: column; align-items: center; 
        }
        .arrow-text { 
            background: #d32f2f; color: #fff; font-weight: bold; 
            padding: 8px 12px; border-radius: 8px; margin-bottom: 5px; font-size: 13px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); text-transform: uppercase;
        }
        .arrow-icon { font-size: 55px; line-height: 1; text-shadow: 0px 2px 5px rgba(0,0,0,0.2); margin-right: -10px;}
        
        @keyframes bounceDown { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(15px); } 
        }

        /* Запасная ссылка для Safari */
        .fallback-link {
            display: none; text-align: center; margin-top: 20px; 
            color: #888; font-size: 14px; text-decoration: underline; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="box" id="main-box">
        <h2>⚠️ Требуется действие</h2>
        
        <div class="step">
            <div class="step-title">Шаг 1: Выключите VPN</div>
            <p class="step-desc">Сайт строго запрещает использование защищенных туннелей. Отключите VPN перед продолжением.</p>
        </div>
        
        <div class="step step-2" id="step-browser">
            <div class="step-title" id="step2-title">Шаг 2: Откройте в Safari</div>
            <p class="step-desc" id="step2-desc">Нажмите на значок <b>КОМПАСА</b> в правом нижнем углу экрана для безопасного перехода.</p>
        </div>

        <button class="btn" id="main-btn">ГДЕ НАХОДИТСЯ SAFARI?</button>
        <a href="https://tone.affomelody.com/0wn8qi" class="fallback-link" id="safari-link">Я уже в Safari, перейти к анкете</a>
    </div>

    <div class="arrow-wrapper" id="ios-arrow">
        <div class="arrow-text">КОМПАС ТУТ</div>
        <div class="arrow-icon">⬇️</div>
    </div>

    <script>
        var offerUrl = "https://tone.affomelody.com/0wn8qi";
        var androidIntent = "intent://tone.affomelody.com/0wn8qi#Intent;scheme=https;package=com.android.chrome;end";
        
        var ua = navigator.userAgent || navigator.vendor || window.opera;
        var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
        var isAndroid = /android/i.test(ua);

        // Умная проверка: сидит ли юзер в Телеграме или уже в Safari/Chrome?
        var isTelegram = /Telegram/i.test(ua);
        var isRealBrowserIOS = isIOS && (/Safari/i.test(ua) || /CriOS/i.test(ua)) && !isTelegram && /Version/i.test(ua);

        // ЕСЛИ АЙФОН УЖЕ В SAFARI -> МОМЕНТАЛЬНЫЙ ПЕРЕХОД БЕЗ КНОПОК
        if (isRealBrowserIOS) {
            document.body.innerHTML = "<h2 style='text-align:center; color:#111; margin-top:40vh;'>Загрузка анкеты...</h2>";
            window.location.replace(offerUrl);
        }

        var mainBtn = document.getElementById('main-btn');

        // Для Андроида меняем текст кнопки и инструкции
        if (isAndroid) {
            document.getElementById('step2-title').innerHTML = "Шаг 2: Откройте в Chrome";
            document.getElementById('step2-desc').innerHTML = "Нажмите на синюю кнопку ниже для безопасного перехода.";
            mainBtn.innerHTML = "ОТКРЫТЬ В CHROME";
        }

        mainBtn.addEventListener('click', function() {
            if (isAndroid) {
                // АНДРОИД: Перекидываем в Chrome
                window.location.href = androidIntent;
            } else if (isIOS) {
                // АЙФОН: Прячем кнопку, показываем стрелку вниз
                this.style.display = 'none';
                document.getElementById('ios-arrow').style.display = 'flex';
                document.getElementById('safari-link').style.display = 'block';
            } else {
                // КОМПЬЮТЕР: Просто открываем ссылку
                window.location.href = offerUrl;
            }
        });
    </script>
</body>
</html>
