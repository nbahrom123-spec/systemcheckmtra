<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Доступ ограничен</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: #0c0d10; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        .container {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100%; text-align: center; padding: 20px; box-sizing: border-box;
        }
        .hidden { display: none !important; }
        
        .icon-lock { font-size: 70px; margin-bottom: 10px; }
        h1 { font-size: 26px; color: #ffeb3b; margin-bottom: 10px; }
        p { font-size: 17px; color: #ccc; line-height: 1.5; margin-bottom: 20px; max-width: 300px; }

        /* Огромная стрелка в правый нижний угол для Айфонов */
        .arrow-container {
            position: absolute; bottom: 80px; right: 20px;
            display: flex; flex-direction: column; align-items: flex-end;
        }
        .arrow-text {
            font-size: 16px; font-weight: bold; color: #111;
            background: #ffeb3b; padding: 8px 12px; border-radius: 8px;
            margin-bottom: 10px; box-shadow: 0 4px 15px rgba(255, 235, 59, 0.4);
        }
        .arrow-icon {
            font-size: 60px; line-height: 1;
            animation: pointDownRight 0.8s infinite alternate;
        }
        @keyframes pointDownRight {
            0% { transform: translate(0, 0); }
            100% { transform: translate(12px, 12px); }
        }

        /* Кнопка для Андроида (на всякий случай) */
        .btn {
            background: #0088cc; color: white; padding: 18px 30px; border-radius: 12px;
            text-decoration: none; font-size: 18px; font-weight: bold; width: 80%; max-width: 300px;
        }
    </style>
</head>
<body>

    <div id="ios-jail" class="container hidden">
        <div class="icon-lock">🛑</div>
        <h1>Телеграм блокирует сайт</h1>
        <p>Для доступа к анкетам нажмите на значок <b>КОМПАСА</b> в правом нижнем углу экрана.</p>
        
        <div class="arrow-container">
            <div class="arrow-text">НАЖМИ СЮДА</div>
            <div class="arrow-icon">↘️</div>
        </div>
    </div>

    <div id="android-redirect" class="container hidden">
        <div class="icon-lock">🚀</div>
        <h1>Загрузка анкеты...</h1>
        <p>Переводим вас в безопасный браузер Chrome.</p>
        <a href="#" id="android-btn" class="btn">ОТКРЫТЬ В CHROME</a>
    </div>

    <script>
        // Твоя ссылка
        var url = "https://tone.affomelody.com/0wn8qi";
        
        // Ссылка для принудительного открытия Chrome на Android
        var androidIntent = "intent://tone.affomelody.com/0wn8qi#Intent;scheme=https;package=com.android.chrome;end";
        
        var ua = navigator.userAgent || navigator.vendor || window.opera;
        var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
        var isTelegram = /Telegram/i.test(ua); // Проверяем, сидит ли он внутри Телеграма

        window.onload = function() {
            // ЛОГИКА 1: Это Айфон И он сидит внутри Телеграма
            if (isIOS && isTelegram) {
                // Показываем экран блокировки со стрелкой. Кнопок перехода НЕТ.
                document.getElementById('ios-jail').classList.remove('hidden');
            } 
            // ЛОГИКА 2: Это Андроид
            else if (/android/i.test(ua)) {
                // Показываем экран загрузки и бьем интент-ссылкой
                document.getElementById('android-redirect').classList.remove('hidden');
                document.getElementById('android-btn').href = androidIntent;
                setTimeout(function() { window.location.href = androidIntent; }, 500);
            } 
            // ЛОГИКА 3: Он уже нажал компас и открыл Safari! (Или сидит с ПК)
            else {
                // Ничего не показываем, мгновенно перекидываем на партнерку!
                window.location.replace(url);
            }
        };
    </script>

</body>
</html>
