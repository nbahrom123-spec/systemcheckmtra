<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        h2 { font-size: 24px; margin-bottom: 10px; }
        p { font-size: 16px; color: #aaaaaa; margin-bottom: 30px; line-height: 1.5; }
        .btn {
            background-color: #0088cc;
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 15px 30px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-block;
            width: 80%;
            max-width: 300px;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.4);
        }
        #instruction {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 235, 59, 0.1);
            border-radius: 10px;
            font-size: 16px;
            color: #ffeb3b;
            border: 2px dashed #ffeb3b;
            width: 85%;
            max-width: 350px;
            line-height: 1.6;
        }
        .arrow {
            font-size: 40px;
            display: block;
            margin-top: 15px;
            animation: bounce 1s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(10px); }
        }
    </style>
</head>
<body>

    <h2>Анкета готова к просмотру 🔞</h2>
    <p>Телеграм может блокировать фото. Нажми кнопку ниже, чтобы открыть анкету.</p>

    <a href="https://tone.affomelody.com/0wn8qi" target="_blank" rel="noopener noreferrer" class="btn" id="go-btn">
        ОТКРЫТЬ В БРАУЗЕРЕ
    </a>

    <div id="instruction"></div>

    <script>
        document.getElementById('go-btn').addEventListener('click', function(e) {
            // Определяем устройство пользователя
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            var instr = document.getElementById('instruction');
            
            // Показываем блок с инструкцией
            instr.style.display = 'block';

            // Если это iPhone / iPad (iOS)
            if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
                instr.innerHTML = "<b>У ТЕБЯ АЙФОН? 🍎</b><br><br>Сайт не откроется внутри Телеграма!<br>Нажми на значок <b>КОМПАСА</b> в правом нижнем углу экрана, чтобы перейти к анкете! <span class='arrow'>↘️</span>";
            } 
            // Если это Android или ПК
            else {
                instr.innerHTML = "<b>ВАЖНО! 🤖</b><br><br>Сайт может выдать ошибку внутри Телеграма.<br>Нажми на <b>ТРИ ТОЧКИ</b> в правом верхнем углу и выбери <b>«Открыть в браузере»</b>! <span class='arrow'>↗️</span>";
            }
        });
    </script>

</body>
</html>
