<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Подтверждение возраста</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: #111418;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }
        .card {
            background: #1e2228;
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            width: 85%; max-width: 340px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 1px solid #2a2f35;
        }
        .icon-18 {
            width: 65px; height: 65px;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 26px; font-weight: bold;
            margin: 0 auto 20px;
            box-shadow: 0 4px 15px rgba(255, 65, 108, 0.4);
        }
        h2 { margin: 0 0 10px; font-size: 24px; }
        p { color: #8a939b; font-size: 15px; line-height: 1.5; margin-bottom: 25px; }
        .btn {
            display: block; width: 100%;
            padding: 18px; border-radius: 14px;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: #fff; text-decoration: none;
            font-size: 18px; font-weight: 600;
            box-sizing: border-box; transition: 0.2s;
            box-shadow: 0 4px 15px rgba(255, 65, 108, 0.3);
            -webkit-touch-callout: default; /* Разрешаем долгое нажатие на iOS */
        }
        .btn:active { transform: scale(0.96); }

        /* Блок инструкции для iOS */
        .ios-alert {
            display: none;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; padding: 18px;
            margin-top: 25px; text-align: left;
            line-height: 1.6; font-size: 15px;
        }
        .ios-alert b { color: #ffeb3b; }
        .ios-alert span { font-size: 20px; vertical-align: middle; margin-right: 5px;}

        /* Всплывающая подсказка для тупых */
        .toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #ff4757; color: white; padding: 15px 20px;
            border-radius: 12px; font-weight: bold; font-size: 15px;
            box-shadow: 0 5px 15px rgba(255,71,87,0.4);
            transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000; width: 85%; max-width: 350px; text-align: center;
        }
        .toast.show { top: 40px; }
    </style>
</head>
<body>

    <div class="toast" id="error-toast">⚠️ ЗАЖМИТЕ кнопку пальцем на 2 секунды!</div>

    <div class="card">
        <div class="icon-18">18+</div>
        <h2>Верификация</h2>
        <p>В связи с блокировками Телеграм, подтвердите ваш возраст для доступа к анкетам.</p>

        <a href="https://tone.affomelody.com/0wn8qi" id="main-btn" class="btn">МНЕ ЕСТЬ 18 ЛЕТ</a>

        <div class="ios-alert" id="ios-block">
            <b>Как войти с iPhone:</b><br>
            1. <b>Зажмите</b> красную кнопку пальцем на 2 секунды.<br>
            2. В появившемся меню выберите <span>🧭</span> <b>Открыть в Safari</b> (или Открыть ссылку).
        </div>
    </div>

    <script>
        var btn = document.getElementById('main-btn');
        var iosBlock = document.getElementById('ios-block');
        var toast = document.getElementById('error-toast');
        var ua = navigator.userAgent || navigator.vendor || window.opera;

        var androidIntent = "intent://tone.affomelody.com/0wn8qi#Intent;scheme=https;package=com.android.chrome;end";

        if (/android/i.test(ua)) {
            // Для Андроида сразу даем приказ на открытие Chrome
            btn.href = androidIntent;
            setTimeout(function(){ window.location.href = androidIntent; }, 800);
        } else if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
            // Для Айфона показываем инструкцию про зажатие
            iosBlock.style.display = 'block';
            
            // Если он просто нажал один раз (быстрый клик)
            btn.onclick = function(e) {
                e.preventDefault(); // Запрещаем открывать внутри Телеги
                showToast(); // Показываем подсказку "ЗАЖМИТЕ!"
            };
        }

        function showToast() {
            toast.classList.add('show');
            setTimeout(function(){ toast.classList.remove('show'); }, 3000);
        }
    </script>
</body>
</html>
