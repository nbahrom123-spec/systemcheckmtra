<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подтверждение возраста</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            padding: 20px;
            max-width: 90%;
            width: 400px;
        }
        h1 {
            font-size: 26px;
            margin-bottom: 15px;
        }
        p {
            font-size: 16px;
            color: #a0a0a0;
            margin-bottom: 40px;
            line-height: 1.5;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            box-sizing: border-box;
            transition: opacity 0.2s;
        }
        .btn:active {
            opacity: 0.8;
        }
        .btn-yes {
            background-color: #fe2c55; /* Цвет кнопки TikTok для нативности */
            color: white;
        }
        .btn-no {
            background-color: #2a2a2a;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Вам уже есть 18 лет?</h1>
        <p>Для доступа к материалам сайта необходимо подтвердить свой возраст.</p>

        <!-- Твоя партнерская ссылка зашита сюда -->
        <a href="https://rubik.top/click?o=2&a=1551&sub_id2=Kaztitut" class="btn btn-yes">Да, мне есть 18</a>

        <!-- Кнопка отвода глаз для модераторов ТикТока -->
        <a href="https://google.com" class="btn btn-no">Нет, мне меньше 18</a>
    </div>
</body>
</html>
